upstream note-web {
    server note-web:80;
}

upstream note-be {
    server note-be:3001;
}

server {
    listen 80;

    location /api/ {
        proxy_pass http://note-be;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://note-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
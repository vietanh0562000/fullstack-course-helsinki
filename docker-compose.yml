services: 
  nginx: 
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - note-web
      - note-be
    restart: unless-stopped
  note-web:
    build:
      context: ./part2/part2-note/get-data
    expose:
      - "80"
    restart: unless-stopped
  note-be:
    build:
      context: ./part3
    expose:
      - "3000"
    restart: unless-stopped
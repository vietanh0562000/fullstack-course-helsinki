server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing — try the file, then index.html
    location / {
        try_files $uri $uri/ /index.html;
        # Translation:
        # 1. Try serving the exact file (e.g., /assets/main.js)
        # 2. Try it as a directory
        # 3. If nothing matches, serve index.html (let React Router handle it)
    }

    # Cache static assets aggressively (they have hash in filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Vite adds a hash to filenames (main-abc123.js)
        # so we can cache forever — new deploys = new filenames
    }

    # Don't cache index.html (so users get the latest version)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}